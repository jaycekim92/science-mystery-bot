name: Publish from queue (science-mystery)

# 생성·카드렌더(Pillow+Openverse 사진)는 로컬(컴퓨터 켤 때)이 하고 queue.json에 적재.
# 발행만 여기(서버 cron)서: 큐에서 가장 오래된 1건 꺼내 슬랙 검토채널로 발송.
# 이미지는 repo가 public이라 raw 직링크로 실림(미러 불필요).
on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = KST 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -q certifi
      - name: Publish from queue
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python publish_queue.py 1
      - name: Commit dequeued state
        run: |
          git config user.email "bot@action.local"
          git config user.name "science publisher"
          git add queue.json
          git diff --staged --quiet || { git commit -q -m "published from queue"; git push; }
